// Polyfill window.storage using localStorage
if (!window.storage) {
  window.storage = {
    async get(key) { try { const v = localStorage.getItem('hbs-pm-' + key); return v !== null ? { key, value: v } : null; } catch { return null; } },
    async set(key, value) { try { localStorage.setItem('hbs-pm-' + key, value); return { key, value }; } catch { return null; } },
    async delete(key) { try { localStorage.removeItem('hbs-pm-' + key); return { key, deleted: true }; } catch { return null; } },
    async list(prefix) { try { const keys = []; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k.startsWith('hbs-pm-' + (prefix || ''))) keys.push(k.replace('hbs-pm-', '')); } return { keys }; } catch { return null; } },
  };
}

// ─── Helpers ─────────────────────────────────────────────────────────────
const buildTree = (items) => {
  const map = {};
  items.forEach((it) => (map[it.id] = { ...it, children: [] }));
  const roots = [];
  items.forEach((it) => {
    if (it.parentId && map[it.parentId]) map[it.parentId].children.push(map[it.id]);
    else roots.push(map[it.id]);
  });
  return roots;
};

const flattenTree = (nodes, depth = 0) => {
  let out = [];
  nodes.forEach((n) => {
    out.push({ ...n, depth });
    if (n.children) out = out.concat(flattenTree(n.children, depth + 1));
  });
  return out;
};

const dateToX = (dateStr, minDate, dayWidth) => {
  if (!dateStr || !minDate) return 0;
  const d = new Date(dateStr);
  const diff = (d - minDate) / 86400000;
  return diff * dayWidth;
};

// ─── CSV / XLSX parsing ──────────────────────────────────────────────────
const parseCSV = (text) => {
  const lines = text.split(/\r?\n/).filter(Boolean);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map((h) => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map((line) => {
    const vals = line.split(",").map((v) => v.trim().replace(/^"|"$/g, ""));
    const obj = {};
    headers.forEach((h, i) => (obj[h] = vals[i] || ""));
    return obj;
  });
};

const exportCSV = (items, team) => {
  const headers = ["WBS ID","Level","Name","Description","Status","Priority","Assignee","Responsible Role","Category","Tags","Start Date","End Date","Due Date","% Complete","Est Hours","Actual Hours","Budget/Cost","Dependencies"];
  const rows = items.map((it) => {
    const assigneeName = it.assignee ? (team.find((t) => t.id === it.assignee)?.name || "") : "";
    return [it.wbsId, it.level, it.name, it.description, it.status, it.priority, assigneeName, it.responsibleRole, it.category, it.tags, it.startDate, it.endDate, it.dueDate, it.pctComplete, it.estHours, it.actualHours, it.budgetCost, it.dependencies].map((v) => `"${String(v).replace(/"/g, '""')}"`).join(",");
  });
  return [headers.join(","), ...rows].join("\n");
};

// ─── Styled Btn ──────────────────────────────────────────────────────────
const Btn = ({ children, onClick, variant = "default", small, style: sx, disabled, title: t }) => {
  const [hov, setHov] = useState(false);
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6, cursor: disabled ? "not-allowed" : "pointer",
    border: "none", borderRadius: 6, fontSize: small ? 12 : 13, fontWeight: 600,
    padding: small ? "4px 10px" : "7px 14px", transition: "all .15s", opacity: disabled ? 0.5 : 1,
    fontFamily: "inherit", letterSpacing: ".01em",
  };
  const variants = {
    default: { background: "var(--surface-alt)", color: "var(--text)" },
    primary: { background: hov ? "var(--accent-hover)" : "var(--accent)", color: "#fff" },
    danger: { background: hov ? "#b91c1c" : "var(--danger)", color: "#fff" },
    ghost: { background: "transparent", color: "var(--text-muted)" },
  };
  return <button style={{ ...base, ...variants[variant], ...sx }} onClick={disabled ? undefined : onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} title={t}>{children}</button>;
};

// ─── Editable Cell ───────────────────────────────────────────────────────
const EditCell = ({ value, onChange, type = "text", options, style: sx, placeholder, disabled }) => {
  if (disabled) return <span style={{ ...sx, opacity: 0.6 }}>{value}</span>;
  if (type === "select") {
    return (
      <select value={value} onChange={(e) => onChange(e.target.value)} style={{ background: "var(--surface-alt)", color: "var(--text)", border: "1px solid var(--border)", borderRadius: 4, padding: "3px 6px", fontSize: 12, fontFamily: "inherit", width: "100%", ...sx }}>
        <option value="">—</option>
        {(options || []).map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }
  if (type === "number") {
    return <input type="number" value={value} onChange={(e) => onChange(Number(e.target.value))} style={{ background: "var(--surface-alt)", color: "var(--text)", border: "1px solid var(--border)", borderRadius: 4, padding: "3px 6px", fontSize: 12, fontFamily: "inherit", width: 70, ...sx }} />;
  }
  return <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} style={{ background: "var(--surface-alt)", color: "var(--text)", border: "1px solid var(--border)", borderRadius: 4, padding: "3px 6px", fontSize: 12, fontFamily: "inherit", width: "100%", ...sx }} />;
};

// ─── Modal ───────────────────────────────────────────────────────────────
const Modal = ({ open, onClose, title, children, width = 560 }) => {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,.45)", backdropFilter: "blur(4px)" }} onClick={onClose}>
      <div style={{ background: "var(--surface)", borderRadius: 12, padding: 24, width, maxWidth: "92vw", maxHeight: "85vh", overflow: "auto", boxShadow: "0 20px 60px rgba(0,0,0,.3)", border: "1px solid var(--border)" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>{title}</h3>
          <Btn variant="ghost" small onClick={onClose}><Icon name="x" size={18} /></Btn>
        </div>
        {children}
      </div>
    </div>
  );
};

    <Btn variant="ghost" small onClick={() => onRemove(member.id)}><Icon name="trash" size={14} /></Btn>

// ═══════════════════════════════════════════════════════════════════════════
function ProjectManager() {
  const [theme, setTheme] = useState("dark");
  const c = COLORS[theme];

  // Project config
  const [projectName, setProjectName] = useState("My Project");
  const [prefix, setPrefix] = useState("PROJ");
  const [statuses, setStatuses] = useState(DEFAULT_STATUSES);
  const [customStatusInput, setCustomStatusInput] = useState("");

  // Auth / identity
  const [currentUser, setCurrentUser] = useState(null); // { id, name, email, photo }
  const [signInEmail, setSignInEmail] = useState("");

  // Data
  const [items, setItems] = useState([]);
  const [team, setTeam] = useState([]);
  const [seq, setSeq] = useState(1);
  const [collapsed, setCollapsed] = useState({});
  const [hiddenCols, setHiddenCols] = useState({});
  const [lockedCols, setLockedCols] = useState({});
  const [colOrder, setColOrder] = useState(null);

  // Drag & drop state
  const [kanbanDrag, setKanbanDrag] = useState(null);
  const [kanbanOver, setKanbanOver] = useState(null);
  const [rowDrag, setRowDrag] = useState(null);
  const [rowOver, setRowOver] = useState(null);
  const [colDrag, setColDrag] = useState(null);
  const [colOver, setColOver] = useState(null);

  // Views
  const [view, setView] = useState("dashboard");
  const [showSettings, setShowSettings] = useState(false);
  const [showTeam, setShowTeam] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showDetail, setShowDetail] = useState(null);
  const [showHelp, setShowHelp] = useState(false);
  const [completedDays, setCompletedDays] = useState(14);
  const [upcomingDays, setUpcomingDays] = useState(7);
  const [filterStatus, setFilterStatus] = useState("");
  const [filterPriority, setFilterPriority] = useState("");
  const [filterAssignee, setFilterAssignee] = useState("");
  const [searchText, setSearchText] = useState("");

  // Team form
  const [newName, setNewName] = useState("");
  const [newEmail, setNewEmail] = useState("");
  const [newPhoto, setNewPhoto] = useState("");

  const fileRef = useRef(null);
  const dashboardRef = useRef(null);

  // ─── Persistence ─────────────────────────────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("pm-state");
        if (res?.value) {
          const s = JSON.parse(res.value);
          if (s.items) setItems(s.items);
          if (s.team) setTeam(s.team);
          if (s.seq) setSeq(s.seq);
          if (s.projectName) setProjectName(s.projectName);
          if (s.prefix) setPrefix(s.prefix);
          if (s.statuses) setStatuses(s.statuses);
          if (s.theme) setTheme(s.theme);
          if (s.collapsed) setCollapsed(s.collapsed);
          if (s.hiddenCols) setHiddenCols(s.hiddenCols);
          if (s.lockedCols) setLockedCols(s.lockedCols);
          if (s.colOrder) setColOrder(s.colOrder);
        }
        // Load personal user session
        const userRes = await window.storage.get("pm-user-session");
        if (userRes?.value) { setCurrentUser(JSON.parse(userRes.value)); }
      } catch (_) {}
    })();
  }, []);

  const persist = useCallback(
    _.debounce((state) => {
      try { window.storage.set("pm-state", JSON.stringify(state)); } catch (_) {}
    }, 800),
    []
  );

  useEffect(() => {
    persist({ items, team, seq, projectName, prefix, statuses, theme, collapsed, hiddenCols, lockedCols, colOrder });
  }, [items, team, seq, projectName, prefix, statuses, theme, collapsed, hiddenCols, lockedCols, colOrder]);

  // ─── Auth helpers ───────────────────────────────────────────────────
  const signIn = (member) => {
    setCurrentUser(member);
    try { window.storage.set("pm-user-session", JSON.stringify(member)); } catch (_) {}
  };
  const signOut = () => {
    setCurrentUser(null);
    try { window.storage.delete("pm-user-session"); } catch (_) {}
  };

  // ─── Item CRUD ───────────────────────────────────────────────────────
  const addItem = (level, parentId = null) => {
    const newItem = makeItem(level, parentId, prefix, seq);
    if (currentUser) { newItem.createdBy = currentUser.name; newItem.createdAt = new Date().toISOString(); }
    setItems((prev) => [...prev, newItem]);
    setSeq((s) => s + 1);
  };

  const updateItem = (id, field, value) => {
    setItems((prev) => prev.map((it) => {
      if (it.id !== id) return it;
      const updated = { ...it, [field]: value };
      if (currentUser) { updated.lastEditedBy = currentUser.name; updated.lastEditedAt = new Date().toISOString(); }
      return updated;
    }));
  };

  const addComment = (itemId, text) => {
    if (!text.trim()) return;
    const comment = {
      id: uid(), text: text.trim(),
      author: currentUser?.name || "Anonymous",
      authorId: currentUser?.id || null,
      authorPhoto: currentUser?.photo || null,
      date: new Date().toISOString(),
    };
    setItems((prev) => prev.map((it) => it.id === itemId ? { ...it, comments: [...(it.comments || []), comment] } : it));
  };

  const deleteComment = (itemId, commentId) => {
    setItems((prev) => prev.map((it) => it.id === itemId ? { ...it, comments: (it.comments || []).filter((cm) => cm.id !== commentId) } : it));
  };

  const deleteItem = (id) => {
    const toRemove = new Set();
    const walk = (pid) => {
      toRemove.add(pid);
      items.filter((it) => it.parentId === pid).forEach((ch) => walk(ch.id));
    };
    walk(id);
    setItems((prev) => prev.filter((it) => !toRemove.has(it.id)));
  };

  const toggleCollapse = (id) => setCollapsed((prev) => ({ ...prev, [id]: !prev[id] }));

  // ─── Filtering ───────────────────────────────────────────────────────
  const filteredItems = useMemo(() => {
    return items.filter((it) => {
      if (filterStatus && it.status !== filterStatus) return false;
      if (filterPriority && it.priority !== filterPriority) return false;
      if (filterAssignee && it.assignee !== filterAssignee) return false;
      if (searchText && !it.name.toLowerCase().includes(searchText.toLowerCase()) && !it.wbsId.toLowerCase().includes(searchText.toLowerCase())) return false;
      return true;
    });
  }, [items, filterStatus, filterPriority, filterAssignee, searchText]);

  const tree = useMemo(() => buildTree(filteredItems), [filteredItems]);
  const flatItems = useMemo(() => flattenTree(tree), [tree]);

  // Visible flat items respecting collapse
  const visibleItems = useMemo(() => {
    const collSet = new Set();
    const markHidden = (nodes) => {
      nodes.forEach((n) => {
        if (collapsed[n.id] && n.children) {
          const hideAll = (ch) => { ch.forEach((c2) => { collSet.add(c2.id); if (c2.children) hideAll(c2.children); }); };
          hideAll(n.children);
        }
        if (n.children) markHidden(n.children);
      });
    };
    markHidden(tree);
    return flatItems.filter((it) => !collSet.has(it.id));
  }, [flatItems, collapsed, tree]);

  // ─── Import ──────────────────────────────────────────────────────────
  const handleFileImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        const rows = parseCSV(text);
        let s = seq;
        const newItems = rows.map((r) => {
          const it = makeItem(r["Level"] || "L4", null, prefix, s++);
          it.name = r["Name"] || r["Task Name"] || "";
          it.description = r["Description"] || "";
          it.status = statuses.includes(r["Status"]) ? r["Status"] : "Not Started";
          it.priority = PRIORITIES.includes(r["Priority"]) ? r["Priority"] : "Medium";
          it.category = r["Category"] || r["Category/Department"] || "";
          it.tags = r["Tags"] || r["Tags/Labels"] || "";
          it.startDate = r["Start Date"] || "";
          it.endDate = r["End Date"] || "";
          it.dueDate = r["Due Date"] || "";
          it.pctComplete = parseInt(r["% Complete"]) || 0;
          it.estHours = parseFloat(r["Est Hours"]) || 0;
          it.actualHours = parseFloat(r["Actual Hours"]) || 0;
          it.budgetCost = parseFloat(r["Budget/Cost"]) || 0;
          it.responsibleRole = r["Responsible Role"] || "";
          it.dependencies = r["Dependencies"] || "";
          return it;
        });
        setItems((prev) => [...prev, ...newItems]);
        setSeq(s);
        setShowImport(false);
      } catch (err) {
        alert("Error importing file: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const handleExport = () => {
    const csv = exportCSV(items, team);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${projectName.replace(/\s/g, "_")}_export.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ─── Dashboard image export ──────────────────────────────────────────
  const exportDashboardImage = async () => {
    const el = dashboardRef.current;
    if (!el) return;
    try {
      // Use svg foreignObject approach for a clean screenshot
      const width = el.scrollWidth;
      const height = el.scrollHeight;
      const clone = el.cloneNode(true);
      // Inline all computed styles
      const inlineStyles = (source, target) => {
        const computed = window.getComputedStyle(source);
        for (let i = 0; i < computed.length; i++) {
          const prop = computed[i];
          target.style.setProperty(prop, computed.getPropertyValue(prop));
        }
        const srcChildren = source.children;
        const tgtChildren = target.children;
        for (let i = 0; i < srcChildren.length; i++) {
          if (tgtChildren[i]) inlineStyles(srcChildren[i], tgtChildren[i]);
        }
      };
      inlineStyles(el, clone);
      clone.style.position = "absolute";
      clone.style.left = "-99999px";
      document.body.appendChild(clone);

      const canvas = document.createElement("canvas");
      const scale = 2;
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = c.bg;
      ctx.fillRect(0, 0, width, height);

      // Use the SVG foreignObject method
      const data = new XMLSerializer().serializeToString(clone);
      const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${data}</div></foreignObject></svg>`;
      const img = new Image();
      const svgBlob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const svgUrl = URL.createObjectURL(svgBlob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob2) => {
          if (blob2) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob2);
            link.download = `${projectName.replace(/\s/g, "_")}_dashboard_${new Date().toISOString().slice(0, 10)}.png`;
            link.click();
            URL.revokeObjectURL(link.href);
          }
          document.body.removeChild(clone);
          URL.revokeObjectURL(svgUrl);
        }, "image/png");
      };
      img.onerror = () => {
        // Fallback: simple text export notification
        document.body.removeChild(clone);
        URL.revokeObjectURL(svgUrl);
        alert("Image export encountered an issue. Try using your browser's screenshot tool (Ctrl+Shift+S on Edge/Chrome) to capture the dashboard area instead.");
      };
      img.src = svgUrl;
    } catch (err) {
      alert("Dashboard export error. Use your browser's built-in screenshot (Ctrl+Shift+S) to capture the dashboard area.");
    }
  };

  // ─── Team ────────────────────────────────────────────────────────────
  const addTeamMember = () => {
    if (!newName.trim()) return;
    setTeam((prev) => [...prev, { id: uid(), name: newName.trim(), email: newEmail.trim(), photo: newPhoto.trim() }]);
    setNewName(""); setNewEmail(""); setNewPhoto("");
  };
  const removeTeamMember = (id) => setTeam((prev) => prev.filter((m) => m.id !== id));

  // ─── Dashboard stats ─────────────────────────────────────────────────
  const stats = useMemo(() => {
    const total = items.length;
    const byStatus = {};
    statuses.forEach((s2) => (byStatus[s2] = 0));
    items.forEach((it) => (byStatus[it.status] = (byStatus[it.status] || 0) + 1));
    const overdue = items.filter((it) => it.dueDate && new Date(it.dueDate) < new Date() && it.status !== "Complete" && it.status !== "Cancelled").length;
    const byAssignee = {};
    items.forEach((it) => {
      if (it.assignee) {
        const name = team.find((t) => t.id === it.assignee)?.name || "Unassigned";
        byAssignee[name] = (byAssignee[name] || 0) + 1;
      }
    });
    const avgCompletion = total ? Math.round(items.reduce((a2, b) => a2 + (b.pctComplete || 0), 0) / total) : 0;

    // Hours: projected vs actual
    const totalEstHours = items.reduce((a, b) => a + (b.estHours || 0), 0);
    const totalActualHours = items.reduce((a, b) => a + (b.actualHours || 0), 0);
    // Hours by level
    const hoursByLevel = {};
    LEVEL_KEYS.forEach((lk) => {
      const lvlItems = items.filter((it) => it.level === lk);
      hoursByLevel[lk] = { est: lvlItems.reduce((a, b) => a + (b.estHours || 0), 0), actual: lvlItems.reduce((a, b) => a + (b.actualHours || 0), 0) };
    });
    // Hours by assignee
    const hoursByAssignee = {};
    items.forEach((it) => {
      const name = it.assignee ? (team.find((t) => t.id === it.assignee)?.name || "Unassigned") : "Unassigned";
      if (!hoursByAssignee[name]) hoursByAssignee[name] = { est: 0, actual: 0 };
      hoursByAssignee[name].est += (it.estHours || 0);
      hoursByAssignee[name].actual += (it.actualHours || 0);
    });

    // Recently completed (configurable window)
    const completedCutoff = new Date(); completedCutoff.setDate(completedCutoff.getDate() - completedDays);
    const recentlyCompleted = items.filter((it) => it.status === "Complete" && it.endDate && new Date(it.endDate) >= completedCutoff).sort((a, b) => new Date(b.endDate) - new Date(a.endDate));

    // Upcoming (configurable window)
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const upcomingCutoff = new Date(today); upcomingCutoff.setDate(upcomingCutoff.getDate() + upcomingDays);
    const upcoming = items.filter((it) => {
      if (it.status === "Complete" || it.status === "Cancelled") return false;
      const due = it.dueDate ? new Date(it.dueDate) : null;
      const end = it.endDate ? new Date(it.endDate) : null;
      const target = due || end;
      return target && target >= today && target <= upcomingCutoff;
    }).sort((a, b) => new Date(a.dueDate || a.endDate) - new Date(b.dueDate || b.endDate));

    return { total, byStatus, overdue, byAssignee, avgCompletion, totalEstHours, totalActualHours, hoursByLevel, hoursByAssignee, recentlyCompleted, upcoming };
  }, [items, team, statuses, completedDays, upcomingDays]);

  // ─── CSS Variables ───────────────────────────────────────────────────
  const cssVars = {
    "--bg": c.bg, "--surface": c.surface, "--surface-alt": c.surfaceAlt, "--border": c.border,
    "--text": c.text, "--text-muted": c.textMuted, "--accent": c.accent, "--accent-hover": c.accentHover,
    "--danger": c.danger, "--success": c.success, "--warning": c.warning,
  };

  // ─── Column definitions for workplan ─────────────────────────────────
  const DEFAULT_COL_ORDER = ["wbsId","level","name","status","priority","assignee","responsibleRole","startDate","endDate","dueDate","pctComplete","estHours","actualHours","budgetCost","category","tags"];
  const COL_META = { wbsId: { label: "WBS ID", w: 90 }, level: { label: "Level", w: 70 }, name: { label: "Name", w: 200 }, status: { label: "Status", w: 110 }, priority: { label: "Priority", w: 90 }, assignee: { label: "Assignee", w: 120 }, responsibleRole: { label: "Role", w: 100 }, startDate: { label: "Start", w: 110 }, endDate: { label: "End", w: 110 }, dueDate: { label: "Due", w: 110 }, pctComplete: { label: "%", w: 55 }, estHours: { label: "Est Hrs", w: 65 }, actualHours: { label: "Act Hrs", w: 65 }, budgetCost: { label: "Cost", w: 70 }, category: { label: "Category", w: 100 }, tags: { label: "Tags", w: 100 } };
  const allCols = (colOrder || DEFAULT_COL_ORDER).map((k) => ({ key: k, ...COL_META[k] }));
  const visibleCols = allCols.filter((col) => !hiddenCols[col.key]);

  // ─── Drag handlers: Kanban ─────────────────────────────────────────
  const onKanbanDragStart = (e, id) => { e.dataTransfer.effectAllowed = "move"; setKanbanDrag({ id }); };
  const onKanbanDragEnd = () => { setKanbanDrag(null); setKanbanOver(null); };
  const onKanbanColumnDragOver = (e, status) => {
    e.preventDefault();
    const cards = Array.from(e.currentTarget.querySelectorAll("[data-kanban-card]"));
    let insertBeforeId = null;
    for (const card of cards) { const rect = card.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { insertBeforeId = card.getAttribute("data-kanban-card"); break; } }
    setKanbanOver({ status, insertBeforeId });
  };
  const onKanbanDrop = (e, targetStatus) => {
    e.preventDefault(); if (!kanbanDrag) return;
    const dragId = kanbanDrag.id;
    setItems((prev) => {
      const updated = prev.map((it) => it.id === dragId ? { ...it, status: targetStatus } : it);
      if (kanbanOver?.insertBeforeId && kanbanOver.status === targetStatus) {
        const inCol = updated.filter((it) => it.level === "L4" && it.status === targetStatus);
        const dragItem = inCol.find((it) => it.id === dragId);
        const others = inCol.filter((it) => it.id !== dragId);
        const idx = others.findIndex((it) => it.id === kanbanOver.insertBeforeId);
        if (idx >= 0) others.splice(idx, 0, dragItem); else others.push(dragItem);
        return [...updated.filter((it) => !(it.level === "L4" && it.status === targetStatus)), ...others];
      }
      return updated;
    });
    setKanbanDrag(null); setKanbanOver(null);
  };

  // ─── Drag handlers: Workplan rows ──────────────────────────────────
  const onRowDragStart = (e, id) => { e.dataTransfer.effectAllowed = "move"; setRowDrag({ id }); };
  const onRowDragEnd = () => { setRowDrag(null); setRowOver(null); };
  const onRowDragOver = (e, targetId) => {
    e.preventDefault(); if (!rowDrag || rowDrag.id === targetId) { setRowOver(null); return; }
    const rect = e.currentTarget.getBoundingClientRect(); const y = e.clientY - rect.top; const third = rect.height / 3;
    setRowOver({ id: targetId, position: y < third ? "before" : y < third * 2 ? "child" : "after" });
  };
  const onRowDrop = (e) => {
    e.preventDefault(); if (!rowDrag || !rowOver) return;
    const dragId = rowDrag.id, targetId = rowOver.id, position = rowOver.position;
    const isDesc = (pid, cid) => { const ch = items.filter((it) => it.parentId === pid); return ch.some((c2) => c2.id === cid || isDesc(c2.id, cid)); };
    if (dragId === targetId || isDesc(dragId, targetId)) { setRowDrag(null); setRowOver(null); return; }
    setItems((prev) => {
      const arr = [...prev]; const di = arr.findIndex((it) => it.id === dragId); const dragItem = { ...arr[di] }; arr.splice(di, 1);
      if (position === "child") { dragItem.parentId = targetId; const ti = arr.findIndex((it) => it.id === targetId); arr.splice(ti + 1, 0, dragItem); }
      else { dragItem.parentId = arr.find((it) => it.id === targetId)?.parentId || null; const ti = arr.findIndex((it) => it.id === targetId); arr.splice(position === "before" ? ti : ti + 1, 0, dragItem); }
      return arr;
    });
    setRowDrag(null); setRowOver(null);
  };

  // ─── Drag handlers: Column reorder ─────────────────────────────────
  const onColDragStart = (e, key) => { e.dataTransfer.effectAllowed = "move"; setColDrag({ key }); e.stopPropagation(); };
  const onColDragEnd = () => { setColDrag(null); setColOver(null); };
  const onColDragOver = (e, key) => { e.preventDefault(); if (colDrag && colDrag.key !== key) setColOver({ key }); };
  const onColDrop = (e, targetKey) => {
    e.preventDefault(); if (!colDrag || colDrag.key === targetKey) return;
    const cur = colOrder || DEFAULT_COL_ORDER; const fi = cur.indexOf(colDrag.key); const ti = cur.indexOf(targetKey);
    if (fi < 0 || ti < 0) return; const n = [...cur]; n.splice(fi, 1); n.splice(ti, 0, colDrag.key);
    setColOrder(n); setColDrag(null); setColOver(null);
  };

  // ═════════════════════════════════════════════════════════════════════
  // RENDER
  // ═════════════════════════════════════════════════════════════════════

  // ─── Sign-in screen ──────────────────────────────────────────────────
  if (!currentUser) {
    return (
      <div style={{ ...cssVars, background: c.bg, color: c.text, fontFamily: "'DM Sans', 'Segoe UI', sans-serif", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
        <div style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 16, padding: 40, width: 420, maxWidth: "92vw", textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,.2)" }}>
          <div style={{ marginBottom: 4 }}><span style={{ fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 24, color: "#6ab04c" }}>HBS.</span> <span style={{ fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 18, color: c.text }}>We bring buildings to life.</span></div>
          <div style={{ fontSize: 14, color: c.textMuted, marginBottom: 24 }}>Project Manager</div>
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Sign In</h2>

          {team.length > 0 ? (
            <div>
              <div style={{ fontSize: 12, color: c.textMuted, marginBottom: 12 }}>Select your team profile:</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                {team.map((m) => (
                  <div key={m.id} onClick={() => signIn(m)} style={{ display: "flex", alignItems: "center", gap: 12, padding: 12, background: c.surfaceAlt, borderRadius: 8, border: `1px solid ${c.border}`, cursor: "pointer", transition: "all .15s" }}
                    onMouseEnter={(e) => e.currentTarget.style.borderColor = c.accent} onMouseLeave={(e) => e.currentTarget.style.borderColor = c.border}>
                    {m.photo ? <img src={m.photo} alt="" style={{ width: 36, height: 36, borderRadius: "50%", objectFit: "cover" }} /> : <div style={{ width: 36, height: 36, borderRadius: "50%", background: c.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 14 }}>{m.name[0].toUpperCase()}</div>}
                    <div style={{ textAlign: "left" }}><div style={{ fontWeight: 600, fontSize: 14 }}>{m.name}</div><div style={{ fontSize: 11, color: c.textMuted }}>{m.email}</div></div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 12, color: c.textMuted, marginBottom: 8 }}>— or enter your email —</div>
            </div>
          ) : (
            <div style={{ fontSize: 12, color: c.textMuted, marginBottom: 12 }}>No team members yet. Enter your name to get started — you can add your team later.</div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <input value={signInEmail} onChange={(e) => setSignInEmail(e.target.value)} placeholder="Email or name…"
              style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "inherit", textAlign: "center" }}
              onKeyDown={(e) => {
                if (e.key === "Enter" && signInEmail.trim()) {
                  const found = team.find((t) => t.email.toLowerCase() === signInEmail.trim().toLowerCase() || t.name.toLowerCase() === signInEmail.trim().toLowerCase());
                  if (found) signIn(found);
                  else signIn({ id: uid(), name: signInEmail.trim(), email: signInEmail.trim(), photo: "" });
                }
              }}
            />
            <Btn variant="primary" style={{ width: "100%", justifyContent: "center", padding: "10px 0" }} onClick={() => {
              if (!signInEmail.trim()) return;
              const found = team.find((t) => t.email.toLowerCase() === signInEmail.trim().toLowerCase() || t.name.toLowerCase() === signInEmail.trim().toLowerCase());
              if (found) signIn(found);
              else signIn({ id: uid(), name: signInEmail.trim(), email: signInEmail.trim(), photo: "" });
            }}>Sign In</Btn>
          </div>

          <div style={{ marginTop: 16, display: "flex", justifyContent: "center" }}>
            <Btn variant="ghost" small onClick={() => setTheme(theme === "dark" ? "light" : "dark")}><Icon name={theme === "dark" ? "sun" : "moon"} size={14} /> {theme === "dark" ? "Light" : "Dark"} mode</Btn>
          </div>
          <div style={{ marginTop: 12, fontSize: 10, color: c.textMuted, letterSpacing: ".03em" }}>Designed by Deyea Miller</div>
        </div>
      </div>
    );
  }

  // ─── Main app (signed in) ────────────────────────────────────────────
  return (
    <div style={{ ...cssVars, background: c.bg, color: c.text, fontFamily: "'DM Sans', 'Segoe UI', sans-serif", minHeight: "100vh", fontSize: 13, lineHeight: 1.5 }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

      {/* ── Top Bar ─────────────────────────────────────────────────────── */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 20px", borderBottom: `1px solid ${c.border}`, background: c.surface }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 4, flexShrink: 0 }}><span style={{ fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 16, color: "#6ab04c" }}>HBS.</span><span style={{ fontWeight: 600, fontSize: 12, color: c.textMuted, whiteSpace: "nowrap" }}>We bring buildings to life.</span></div>
        <input value={projectName} onChange={(e) => setProjectName(e.target.value)} style={{ background: "transparent", border: "none", color: c.text, fontSize: 16, fontWeight: 700, fontFamily: "inherit", outline: "none", flex: 1, minWidth: 120 }} />
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {/* Current user indicator */}
          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 10px", borderRadius: 6, background: c.surfaceAlt, marginRight: 4, cursor: "pointer" }} onClick={signOut} title="Sign out">
            {currentUser.photo ? <img src={currentUser.photo} alt="" style={{ width: 22, height: 22, borderRadius: "50%", objectFit: "cover" }} /> : <div style={{ width: 22, height: 22, borderRadius: "50%", background: c.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700 }}>{currentUser.name[0].toUpperCase()}</div>}
            <span style={{ fontSize: 12, fontWeight: 600, maxWidth: 100, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{currentUser.name}</span>
          </div>
          <Btn variant="ghost" small onClick={() => setShowHelp((p) => !p)} title="Instructions"><Icon name="helpCircle" size={15} /> Help</Btn>
          <Btn variant="ghost" small onClick={() => setShowImport(true)} title="Import"><Icon name="upload" size={15} /> Import</Btn>
          <Btn variant="ghost" small onClick={handleExport} title="Export CSV"><Icon name="download" size={15} /> Export</Btn>
          {view === "dashboard" && <Btn variant="ghost" small onClick={exportDashboardImage} title="Export dashboard as image"><Icon name="camera" size={15} /> Snapshot</Btn>}
          <Btn variant="ghost" small onClick={() => setShowTeam(true)} title="Team"><Icon name="users" size={15} /> Team</Btn>
          <Btn variant="ghost" small onClick={() => setShowSettings(true)} title="Settings"><Icon name="settings" size={15} /></Btn>
          <Btn variant="ghost" small onClick={() => setTheme(theme === "dark" ? "light" : "dark")} title="Toggle theme">
            <Icon name={theme === "dark" ? "sun" : "moon"} size={15} />
          </Btn>
        </div>
      </div>

      {/* ── View Tabs ───────────────────────────────────────────────────── */}
      <div style={{ display: "flex", gap: 2, padding: "8px 20px", borderBottom: `1px solid ${c.border}`, background: c.surface }}>
        {[
          { key: "dashboard", icon: "barChart", label: "Dashboard" },
          { key: "workplan", icon: "list", label: "Workplan" },
          { key: "gantt", icon: "gantt", label: "Gantt" },
          { key: "kanban", icon: "kanban", label: "Kanban" },

        {/* ════ GANTT ════════════════════════════════════════════════════ */}
        {view === "gantt" && (() => {
          const dated = items.filter((it) => it.startDate && (it.endDate || it.dueDate));
          if (!dated.length) return <div style={{ padding: 40, textAlign: "center", color: c.textMuted }}>Add start/end dates to items to see the Gantt chart. L3+ items can have dependencies (enter WBS IDs).</div>;

          // Build hierarchical rows
          const ganttRows = [];
          const l1s = items.filter((it) => it.level === "L1");
          const orphans = dated.filter((it) => !it.parentId && it.level !== "L1");

          const findDescDated = (pid) => {
            const direct = dated.filter((it) => it.parentId === pid);
            let all = [...direct];
            direct.forEach((ch) => { all = all.concat(findDescDated(ch.id)); });
            return all;
          };

          l1s.forEach((l1) => {
            const l1Desc = findDescDated(l1.id);
            const l1Dates = l1Desc.length > 0 ? l1Desc.flatMap((it) => [new Date(it.startDate), new Date(it.endDate || it.dueDate)]) : (l1.startDate ? [new Date(l1.startDate), new Date(l1.endDate || l1.dueDate || l1.startDate)] : []);
            const assignee = l1.assignee ? team.find((t) => t.id === l1.assignee) : null;
            ganttRows.push({ type: "l1", item: l1, startDate: l1Dates.length ? new Date(Math.min(...l1Dates)) : null, endDate: l1Dates.length ? new Date(Math.max(...l1Dates)) : null, assigneeName: assignee?.name || "" });

            const l2s = items.filter((it) => it.level === "L2" && it.parentId === l1.id);
            l2s.forEach((l2) => {
              const l2Desc = findDescDated(l2.id);
              const l2Dates = l2Desc.length > 0 ? l2Desc.flatMap((it) => [new Date(it.startDate), new Date(it.endDate || it.dueDate)]) : (l2.startDate ? [new Date(l2.startDate), new Date(l2.endDate || l2.dueDate || l2.startDate)] : []);
              if (l2Dates.length || l2.startDate) {
                const a2 = l2.assignee ? team.find((t) => t.id === l2.assignee) : null;
                ganttRows.push({ type: "l2", item: l2, startDate: l2Dates.length ? new Date(Math.min(...l2Dates)) : new Date(l2.startDate), endDate: l2Dates.length ? new Date(Math.max(...l2Dates)) : new Date(l2.endDate || l2.dueDate || l2.startDate), assigneeName: a2?.name || "" });
              }
              const addCh = (pid, depth) => {
                dated.filter((it) => it.parentId === pid).sort((a, b) => new Date(a.startDate) - new Date(b.startDate)).forEach((ch) => { ganttRows.push({ type: "detail", item: ch, depth }); addCh(ch.id, depth + 1); });
              };
              addCh(l2.id, 0);
            });
            dated.filter((it) => it.parentId === l1.id && it.level !== "L2").forEach((ch) => ganttRows.push({ type: "detail", item: ch, depth: 0 }));
          });
          orphans.forEach((it) => ganttRows.push({ type: "detail", item: it, depth: 0 }));
          if (!ganttRows.length) return <div style={{ padding: 40, textAlign: "center", color: c.textMuted }}>No items with dates found.</div>;

          const allD = ganttRows.filter((r) => r.startDate || r.item.startDate).flatMap((r) => { const s = r.startDate || new Date(r.item.startDate); const e = r.endDate || new Date(r.item.endDate || r.item.dueDate || r.item.startDate); return [s, e]; });
          if (!allD.length) return <div style={{ padding: 40, textAlign: "center", color: c.textMuted }}>No valid dates.</div>;
          const minDate = new Date(Math.min(...allD)); const maxDate = new Date(Math.max(...allD));
          const totalDays = Math.max(Math.ceil((maxDate - minDate) / 86400000) + 7, 21);
          const dayWidth = 18; const leftCol = 240; const l1H = 42; const l2H = 34; const detailH = 28; const headerH = 48;
          const monthLabels = []; const weekLines = [];
          const mc2 = new Date(minDate); mc2.setDate(1);
          while (mc2 <= new Date(maxDate.getTime() + 7 * 86400000)) { monthLabels.push({ label: mc2.toLocaleString("default", { month: "long" }), x: dateToX(mc2.toISOString().slice(0, 10), minDate, dayWidth) }); mc2.setMonth(mc2.getMonth() + 1); }
          const wk = new Date(minDate); wk.setDate(wk.getDate() - wk.getDay() + 1);
          while (wk <= new Date(maxDate.getTime() + 7 * 86400000)) { weekLines.push({ x: dateToX(wk.toISOString().slice(0, 10), minDate, dayWidth), label: "W" + Math.ceil(wk.getDate() / 7) }); wk.setDate(wk.getDate() + 7); }

          let yPos = headerH;
          const rowYMap = {};
          const rowPos = ganttRows.map((r) => { const h = r.type === "l1" ? l1H : r.type === "l2" ? l2H : detailH; const p = { ...r, y: yPos, h }; rowYMap[r.item.id] = { y: yPos, h }; yPos += h; return p; });
          const totalH = yPos;

          const wbsMap = {}; ganttRows.forEach((r) => { wbsMap[r.item.wbsId] = r; wbsMap[r.item.id] = r; });
          const depLinks = [];
          ganttRows.forEach((r) => {
            if (r.type !== "detail" || !r.item.dependencies) return;
            r.item.dependencies.split(/[,;\s]+/).map((d) => d.trim()).filter(Boolean).forEach((did) => {
              const fr = wbsMap[did]; if (!fr || !rowYMap[fr.item.id] || !rowYMap[r.item.id]) return;
              depLinks.push({ fromX: dateToX(fr.item.endDate || fr.item.dueDate, minDate, dayWidth), fromY: rowYMap[fr.item.id].y + rowYMap[fr.item.id].h / 2 - headerH, toX: dateToX(r.item.startDate, minDate, dayWidth), toY: rowYMap[r.item.id].y + rowYMap[r.item.id].h / 2 - headerH });
            });
          });

          const lvlColor = (lv) => { const i = LEVEL_KEYS.indexOf(lv); return [c.accent, c.success, c.warning, c.hold, c.textMuted][i] || c.textMuted; };

          return (
            <div style={{ overflow: "auto", borderRadius: 8, border: `1px solid ${c.border}`, background: c.surface }}>
              <div style={{ display: "flex", minWidth: leftCol + totalDays * dayWidth }}>
                <div style={{ width: leftCol, flexShrink: 0, borderRight: `1px solid ${c.border}` }}>
                  <div style={{ height: headerH, padding: "6px 12px", fontWeight: 600, fontSize: 11, color: c.textMuted, textTransform: "uppercase", borderBottom: `1px solid ${c.border}`, display: "flex", alignItems: "flex-end" }}>PROJECT ITEMS</div>
                  {rowPos.map((r, i) => (
                    <div key={r.item.id + "-l-" + i} style={{ height: r.h, padding: "0 12px", display: "flex", alignItems: "center", gap: 6, borderBottom: `1px solid ${c.border}`, paddingLeft: r.type === "l1" ? 12 : r.type === "l2" ? 24 : 36 + (r.depth || 0) * 10, background: r.type === "l1" ? `${c.accent}08` : "transparent", fontWeight: r.type === "l1" ? 700 : r.type === "l2" ? 600 : 400, fontSize: r.type === "l1" ? 14 : r.type === "l2" ? 13 : 12 }}>
                      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{r.item.name || r.item.wbsId}</span>
                    </div>
                  ))}
                </div>
                <div style={{ flex: 1, overflow: "auto", position: "relative" }}>
                  <div style={{ height: headerH, borderBottom: `1px solid ${c.border}`, position: "relative" }}>
                    {monthLabels.map((m, i) => <div key={i} style={{ position: "absolute", left: m.x + 4, top: 6, fontSize: 12, fontWeight: 700, color: c.text, whiteSpace: "nowrap" }}>{m.label}</div>)}
                    {weekLines.map((w, i) => <div key={i} style={{ position: "absolute", left: w.x, top: 28, fontSize: 9, color: c.textMuted }}>{w.label}</div>)}
                  </div>
                  <svg style={{ position: "absolute", top: headerH, left: 0, width: totalDays * dayWidth, height: totalH - headerH, pointerEvents: "none", zIndex: 3 }}>
                    <defs><marker id="ga" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={c.textMuted} /></marker></defs>
                    {depLinks.map((lk, i) => <path key={i} d={`M ${lk.fromX + 6} ${lk.fromY} L ${lk.fromX + 6} ${(lk.fromY + lk.toY) / 2} L ${lk.toX - 6} ${(lk.fromY + lk.toY) / 2} L ${lk.toX - 6} ${lk.toY}`} fill="none" stroke={c.textMuted} strokeWidth={1.5} markerEnd="url(#ga)" opacity={0.5} />)}
                  </svg>
                  {weekLines.map((w, i) => <div key={i} style={{ position: "absolute", left: w.x, top: headerH, width: 1, height: totalH - headerH, background: c.border, opacity: 0.3, zIndex: 0 }} />)}
                  {rowPos.map((r, i) => {
                    const sd = r.startDate || (r.item.startDate ? new Date(r.item.startDate) : null);
                    const ed = r.endDate || (r.item.endDate ? new Date(r.item.endDate) : r.item.dueDate ? new Date(r.item.dueDate) : null);
                    if (!sd || !ed) return <div key={r.item.id + "-b-" + i} style={{ height: r.h, borderBottom: `1px solid ${c.border}` }} />;
                    const x1 = dateToX(sd.toISOString().slice(0, 10), minDate, dayWidth);
                    const x2 = dateToX(ed.toISOString().slice(0, 10), minDate, dayWidth);
                    const w2 = Math.max(x2 - x1, dayWidth);
                    const bc = lvlColor(r.item.level);
                    const isL1 = r.type === "l1"; const isL2 = r.type === "l2";
                    const bH = isL1 ? 16 : isL2 ? 12 : 10; const bT = (r.h - bH) / 2; const bR = isL1 ? 8 : isL2 ? 6 : 10;
                    return (
                      <div key={r.item.id + "-b-" + i} style={{ height: r.h, position: "relative", borderBottom: `1px solid ${c.border}`, zIndex: 1 }}>
                        {r.assigneeName && (isL1 || isL2) && <div style={{ position: "absolute", left: x1, top: 1, fontSize: 9, color: bc, fontWeight: 600, whiteSpace: "nowrap", zIndex: 2 }}>{r.assigneeName}</div>}
                        <div style={{ position: "absolute", left: x1, top: bT, width: w2, height: bH, borderRadius: bR, background: `${bc}${isL1 ? "88" : isL2 ? "66" : "55"}`, border: `1.5px solid ${bc}`, overflow: "hidden", zIndex: 1 }}>
                          {r.item.pctComplete > 0 && <div style={{ height: "100%", width: `${r.item.pctComplete}%`, background: `${bc}99`, borderRadius: "inherit" }} />}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })()}


        {/* ════ KANBAN with drag & drop ══════════════════════════════════ */}
        {view === "kanban" && (() => {
          const l4Items = items.filter((it) => it.level === "L4");
          return (
            <div style={{ display: "flex", gap: 14, overflow: "auto", paddingBottom: 12 }}>
              {statuses.map((st) => {
                const col = l4Items.filter((it) => it.status === st);
                const isOverThis = kanbanOver?.status === st;
                return (
                  <div key={st} style={{ minWidth: 270, width: 270, flexShrink: 0 }}
                    onDragOver={(e) => onKanbanColumnDragOver(e, st)} onDrop={(e) => onKanbanDrop(e, st)}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, padding: "6px 0" }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: statusColor(st, c) }} />
                      <span style={{ fontWeight: 700, fontSize: 13 }}>{st}</span>
                      <span style={{ fontSize: 11, color: c.textMuted, marginLeft: "auto" }}>{col.length}</span>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8, minHeight: 60, padding: 4, borderRadius: 8, border: isOverThis ? `2px dashed ${c.accent}` : "2px dashed transparent", background: isOverThis ? c.dropZone : "transparent", transition: "all .15s" }}>
                      {col.map((it) => {
                        const assignee = team.find((t) => t.id === it.assignee);
                        const isDragging = kanbanDrag?.id === it.id;
                        return (
                          <div key={it.id} data-kanban-card={it.id} draggable
                            onDragStart={(e) => onKanbanDragStart(e, it.id)} onDragEnd={onKanbanDragEnd}
                            onClick={() => !isDragging && setShowDetail(it.id)}
                            style={{ background: c.surface, border: `1px solid ${isDragging ? c.accent : c.border}`, borderRadius: 8, padding: 14, boxShadow: isDragging ? `0 4px 16px ${c.accent}33` : c.cardShadow, cursor: "grab", opacity: isDragging ? 0.6 : 1, transform: isDragging ? "rotate(2deg) scale(1.02)" : "none", transition: "all .15s" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 6 }}>
                              <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: c.textMuted }}>{it.wbsId}</span>
                              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                                <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 4, background: `${priorityColor(it.priority, c)}22`, color: priorityColor(it.priority, c) }}>{it.priority}</span>
                                <span onClick={(e) => { e.stopPropagation(); setShowDetail(it.id); }} style={{ cursor: "pointer", opacity: 0.5, display: "inline-flex" }} title="Edit"><Icon name="edit" size={12} /></span>
                                <span onClick={(e) => { e.stopPropagation(); if (confirm(`Delete "${it.name || it.wbsId}"?`)) deleteItem(it.id); }} style={{ cursor: "pointer", opacity: 0.5, display: "inline-flex" }} title="Delete"><Icon name="trash" size={12} color={c.danger} /></span>
                              </div>
                            </div>
                            <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 6 }}>{it.name || "(unnamed)"}</div>
                            {it.dueDate && <div style={{ fontSize: 11, color: c.textMuted, marginBottom: 6 }}>Due: {it.dueDate}</div>}
                            <div style={{ background: c.surfaceAlt, borderRadius: 4, height: 4, marginBottom: 8, overflow: "hidden" }}><div style={{ width: `${it.pctComplete}%`, height: "100%", background: c.accent, borderRadius: 4 }} /></div>
                            {(it.subtaskTexts || []).length > 0 && <div style={{ marginBottom: 6 }}>{it.subtaskTexts.map((s2, i) => <div key={i} style={{ fontSize: 11, color: c.textMuted, padding: "2px 0", display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 12, height: 12, borderRadius: 3, border: `1.5px solid ${c.border}`, flexShrink: 0 }} /> {s2}</div>)}</div>}
                            {assignee && <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: c.textMuted }}>{assignee.photo ? <img src={assignee.photo} alt="" style={{ width: 20, height: 20, borderRadius: "50%", objectFit: "cover" }} /> : <div style={{ width: 20, height: 20, borderRadius: "50%", background: c.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700 }}>{assignee.name[0]}</div>}{assignee.name}</div>}
                          </div>
                        );
                      })}
                      <Btn small style={{ width: "100%", justifyContent: "center" }} onClick={() => {
                        const ni = makeItem("L4", null, prefix, seq); ni.status = st;
                        setItems((prev) => [...prev, ni]); setSeq((s) => s + 1);
                      }}>+ Task</Btn>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* ── Help / Instructions Panel (slides in from right, pushes content) ── */}
      {showHelp && (
        <div style={{ width: 340, flexShrink: 0, borderLeft: `1px solid ${c.border}`, background: c.surface, overflow: "auto", padding: 20, animation: "slideIn .25s ease" }}>
          <style>{`@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`}</style>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}><Icon name="helpCircle" size={18} color={c.accent} /> Instructions</h3>
            <Btn variant="ghost" small onClick={() => setShowHelp(false)}><Icon name="x" size={16} /></Btn>
          </div>

          {[
            { title: "Getting Started", content: "Set your project name and WBS prefix in Settings (⚙️). Add team members via the Team button (👥). Then create your first L1 Milestone from the Workplan view." },
            { title: "WBS Hierarchy", content: "Items follow a 5-level Work Breakdown Structure: L1 Milestone → L2 Deliverable → L3 Activity → L4 Task → L5 Subtask. Each level nests under the one above it. Use the + button on any row to add a child at the next level down." },
            { title: "Views", content: "Dashboard — project health at a glance with charts, hours tracking, and task timelines. Workplan — full spreadsheet view with all fields. Gantt — timeline bars (requires start/end dates). Kanban — drag L4 tasks between status columns, with inline L5 subtasks on each card." },
            { title: "Drag & Drop", content: "Kanban: drag cards between status columns to update their status. Workplan Rows: use the grip handle (⠿) to drag rows — drop on the top third to insert before, middle to nest as a child, bottom to insert after. Column Headers: drag column headers left/right to reorder them." },
            { title: "Importing Data", content: "Click Import in the top bar. Upload a CSV file with headers matching these fields: Name, Level, Status, Priority, Start Date, End Date, Due Date, % Complete, Est Hours, Actual Hours, Budget/Cost, Responsible Role, Category, Tags, Dependencies. Level should be L1–L5. Status and Priority must match available options. Missing fields will use defaults." },
            { title: "CSV Format Example", content: "Name,Level,Status,Priority,Start Date,Due Date,Est Hours\n\"Design Phase\",L1,Not Started,High,2026-04-01,2026-05-01,40\n\"Wireframes\",L2,In Progress,Medium,2026-04-01,2026-04-15,20" },
            { title: "Exporting Data", content: "Export CSV: click the Export button in the top bar to download all items as a CSV file you can open in Excel. Dashboard Snapshot: when on the Dashboard view, click the 📷 Snapshot button to export the dashboard as a PNG image — perfect for uploading to Teams each week." },
            { title: "Teams Integration", content: "To use this in Microsoft Teams: 1) Host the app as an Azure Static Web App or similar. 2) Add it as a Teams Tab in your channel. 3) Use Power Automate to read exported CSV data and send Adaptive Cards or chat reminders for tasks coming due. 4) Use the Snapshot button to export a dashboard image to post in your Teams channel weekly." },
            { title: "Columns & Locking", content: "Lock (🔒) any column to prevent edits. Hide columns via the × on each header or in Settings. Toggle 'Minimal View' to show only key columns. Drag column headers to reorder." },
            { title: "Keyboard Tips", content: "Press Enter in the comment box to quickly add a comment. Press Enter in the custom status field (Settings) to add a new status. All fields are directly editable inline in the Workplan view." },
          ].map((section, i) => (
            <div key={i} style={{ marginBottom: 14 }}>
              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 4, color: c.accent }}>{section.title}</div>
              <div style={{ fontSize: 12, lineHeight: 1.6, color: c.textMuted, whiteSpace: "pre-line" }}>{section.content}</div>
            </div>
          ))}
        </div>
      )}

      </div>{/* end flex wrapper */}

      {/* Footer credit */}
      <div style={{ padding: "6px 20px", borderTop: `1px solid ${c.border}`, background: c.surface, textAlign: "center", fontSize: 10, color: c.textMuted, letterSpacing: ".03em" }}>Designed by Deyea Miller</div>

      {/* ════ DETAIL MODAL ══════════════════════════════════════════════ */}
      <Modal open={!!showDetail} onClose={() => setShowDetail(null)} title="Item Details" width={640}>
        {(() => {
          const item = items.find((it) => it.id === showDetail);
          if (!item) return null;
          const upd = (f, v) => updateItem(item.id, f, v);
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>WBS ID</label><span style={{ fontFamily: "'Space Mono', monospace" }}>{item.wbsId}</span></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Level</label><span>{item.level} — {LEVELS[item.level]}</span></div>
              </div>
              <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Name</label><EditCell value={item.name} onChange={(v) => upd("name", v)} placeholder="Name…" /></div>
              <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Description</label>
                <textarea value={item.description} onChange={(e) => upd("description", e.target.value)} style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: 8, fontSize: 12, fontFamily: "inherit", width: "100%", minHeight: 60, resize: "vertical" }} />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Status</label><EditCell type="select" value={item.status} onChange={(v) => upd("status", v)} options={statuses} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Priority</label><EditCell type="select" value={item.priority} onChange={(v) => upd("priority", v)} options={PRIORITIES} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Assignee</label><EditCell type="select" value={item.assignee || ""} onChange={(v) => upd("assignee", v)} options={team.map((t) => t.id)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Start Date</label><EditCell type="date" value={item.startDate} onChange={(v) => upd("startDate", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>End Date</label><EditCell type="date" value={item.endDate} onChange={(v) => upd("endDate", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Due Date</label><EditCell type="date" value={item.dueDate} onChange={(v) => upd("dueDate", v)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>% Complete</label><EditCell type="number" value={item.pctComplete} onChange={(v) => upd("pctComplete", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Est Hours</label><EditCell type="number" value={item.estHours} onChange={(v) => upd("estHours", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Actual Hours</label><EditCell type="number" value={item.actualHours} onChange={(v) => upd("actualHours", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Budget/Cost</label><EditCell type="number" value={item.budgetCost} onChange={(v) => upd("budgetCost", v)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Responsible Role</label><EditCell value={item.responsibleRole} onChange={(v) => upd("responsibleRole", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Category</label><EditCell value={item.category} onChange={(v) => upd("category", v)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Tags</label><EditCell value={item.tags} onChange={(v) => upd("tags", v)} /></div>
                <div><label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 2 }}>Dependencies</label><EditCell value={item.dependencies} onChange={(v) => upd("dependencies", v)} /></div>
              </div>

              {/* L5 Subtasks on L4 cards */}
              {item.level === "L4" && (
                <div>
                  <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>Subtasks (L5)</label>
                  {(item.subtaskTexts || []).map((st, i) => (
                    <div key={i} style={{ display: "flex", gap: 6, marginBottom: 4, alignItems: "center" }}>
                      <input value={st} onChange={(e) => {
                        const newSubs = [...(item.subtaskTexts || [])];
                        newSubs[i] = e.target.value;
                        upd("subtaskTexts", newSubs);
                      }} style={{ flex: 1, background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 4, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                      <Btn variant="ghost" small onClick={() => { const newSubs = (item.subtaskTexts || []).filter((_, j) => j !== i); upd("subtaskTexts", newSubs); }}><Icon name="x" size={12} /></Btn>
                    </div>
                  ))}
                  <Btn small onClick={() => upd("subtaskTexts", [...(item.subtaskTexts || []), ""])}>+ Add Subtask</Btn>
                </div>
              )}

              {/* Edit tracking */}
              {(item.lastEditedBy || item.createdBy) && (
                <div style={{ fontSize: 11, color: c.textMuted, padding: "6px 0", borderTop: `1px solid ${c.border}`, display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {item.createdBy && <span>Created by <strong>{item.createdBy}</strong>{item.createdAt ? ` · ${new Date(item.createdAt).toLocaleDateString()}` : ""}</span>}
                  {item.lastEditedBy && <span>Last edited by <strong>{item.lastEditedBy}</strong>{item.lastEditedAt ? ` · ${new Date(item.lastEditedAt).toLocaleString()}` : ""}</span>}
                </div>
              )}

              {/* Comments */}
              <div>
                <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 6 }}>Comments ({(item.comments || []).length})</label>
                <div style={{ maxHeight: 260, overflow: "auto", marginBottom: 8 }}>
                  {(item.comments || []).length === 0 && <div style={{ fontSize: 12, color: c.textMuted, padding: 8, textAlign: "center" }}>No comments yet</div>}
                  {(item.comments || []).map((cm) => {
                    const isOwn = currentUser && (cm.authorId === currentUser.id);
                    const photoUrl = cm.authorPhoto || (cm.authorId ? team.find((t) => t.id === cm.authorId)?.photo : null);
                    const timeStr = cm.date ? new Date(cm.date).toLocaleString() : "";
                    return (
                      <div key={cm.id || cm.date} style={{ display: "flex", gap: 8, padding: "8px 4px", borderBottom: `1px solid ${c.border}` }}>
                        {photoUrl ? (
                          <img src={photoUrl} alt="" style={{ width: 28, height: 28, borderRadius: "50%", objectFit: "cover", flexShrink: 0, marginTop: 2 }} />
                        ) : (
                          <div style={{ width: 28, height: 28, borderRadius: "50%", background: c.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, flexShrink: 0, marginTop: 2 }}>{(cm.author || "?")[0].toUpperCase()}</div>
                        )}
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 12, marginBottom: 2 }}>
                            <strong>{cm.author || "Anonymous"}</strong>
                            <span style={{ color: c.textMuted, fontWeight: 400, marginLeft: 6, fontSize: 11 }}>{timeStr}</span>
                          </div>
                          <div style={{ fontSize: 12, lineHeight: 1.5, color: c.text }}>{cm.text}</div>
                        </div>
                        {isOwn && cm.id && (
                          <span onClick={() => deleteComment(item.id, cm.id)} style={{ cursor: "pointer", opacity: 0.4, flexShrink: 0, marginTop: 2 }} title="Delete comment"><Icon name="trash" size={12} color={c.danger} /></span>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  {currentUser?.photo ? <img src={currentUser.photo} alt="" style={{ width: 24, height: 24, borderRadius: "50%", objectFit: "cover", flexShrink: 0 }} /> : currentUser ? <div style={{ width: 24, height: 24, borderRadius: "50%", background: c.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{currentUser.name[0]}</div> : null}
                  <input id="comment-input" placeholder={currentUser ? `Comment as ${currentUser.name}…` : "Sign in to comment…"} disabled={!currentUser}
                    style={{ flex: 1, background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "6px 10px", fontSize: 12, fontFamily: "inherit", opacity: currentUser ? 1 : 0.5 }}
                    onKeyDown={(e) => { if (e.key === "Enter" && e.target.value.trim()) { addComment(item.id, e.target.value); e.target.value = ""; } }}
                  />
                  <Btn small variant="primary" disabled={!currentUser} onClick={() => {
                    const inp = document.getElementById("comment-input");
                    if (inp?.value.trim()) { addComment(item.id, inp.value); inp.value = ""; }
                  }}><Icon name="comment" size={12} /> Add</Btn>
                </div>
              </div>
            </div>
          );
        })()}
      </Modal>

      {/* ════ TEAM MODAL ════════════════════════════════════════════════ */}
      <Modal open={showTeam} onClose={() => setShowTeam(false)} title="Team Members">
        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
          {team.map((m) => <TeamCard key={m.id} member={m} onRemove={removeTeamMember} c={c} />)}
          {team.length === 0 && <div style={{ color: c.textMuted, textAlign: "center", padding: 12 }}>No team members yet.</div>}
        </div>
        <div style={{ borderTop: `1px solid ${c.border}`, paddingTop: 14 }}>
          <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Add Member</h4>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
            <input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="Name" style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "7px 10px", fontSize: 13, fontFamily: "inherit" }} />
            <input value={newEmail} onChange={(e) => setNewEmail(e.target.value)} placeholder="Email" style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "7px 10px", fontSize: 13, fontFamily: "inherit" }} />
          </div>
          <input value={newPhoto} onChange={(e) => setNewPhoto(e.target.value)} placeholder="Photo URL (optional)" style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "7px 10px", fontSize: 13, fontFamily: "inherit", width: "100%", marginBottom: 8 }} />
          <Btn variant="primary" onClick={addTeamMember} disabled={!newName.trim()}><Icon name="plus" size={14} /> Add Member</Btn>
        </div>
      </Modal>

      {/* ════ SETTINGS MODAL ════════════════════════════════════════════ */}
      <Modal open={showSettings} onClose={() => setShowSettings(false)} title="Project Settings">
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>Project Name</label>
            <input value={projectName} onChange={(e) => setProjectName(e.target.value)} style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "8px 12px", fontSize: 14, fontFamily: "inherit", width: "100%" }} />
          </div>
          <div>
            <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>WBS ID Prefix</label>
            <input value={prefix} onChange={(e) => setPrefix(e.target.value.toUpperCase())} style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "8px 12px", fontSize: 14, fontFamily: "inherit", width: 120, fontWeight: 700, letterSpacing: ".04em" }} maxLength={8} />
          </div>
          <div>
            <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>Statuses</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
              {statuses.map((s2) => (
                <span key={s2} style={{ display: "inline-flex", alignItems: "center", gap: 4, background: c.surfaceAlt, border: `1px solid ${c.border}`, borderRadius: 6, padding: "4px 10px", fontSize: 12 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: statusColor(s2, c) }} /> {s2}
                  {!DEFAULT_STATUSES.includes(s2) && (
                    <span onClick={() => setStatuses((p) => p.filter((x) => x !== s2))} style={{ cursor: "pointer", marginLeft: 2, color: c.danger }}>×</span>
                  )}
                </span>
              ))}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <input value={customStatusInput} onChange={(e) => setCustomStatusInput(e.target.value)} placeholder="New status…" style={{ background: c.surfaceAlt, color: c.text, border: `1px solid ${c.border}`, borderRadius: 6, padding: "6px 10px", fontSize: 12, fontFamily: "inherit", flex: 1 }}
                onKeyDown={(e) => { if (e.key === "Enter" && customStatusInput.trim() && !statuses.includes(customStatusInput.trim())) { setStatuses((p) => [...p, customStatusInput.trim()]); setCustomStatusInput(""); } }}
              />
              <Btn small variant="primary" onClick={() => { if (customStatusInput.trim() && !statuses.includes(customStatusInput.trim())) { setStatuses((p) => [...p, customStatusInput.trim()]); setCustomStatusInput(""); } }}>Add</Btn>
            </div>
          </div>
          <div>
            <label style={{ fontSize: 11, color: c.textMuted, display: "block", marginBottom: 4 }}>Hidden Columns</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
              {allCols.map((col) => (
                <label key={col.key} style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12, cursor: "pointer", padding: "3px 8px", borderRadius: 4, background: hiddenCols[col.key] ? `${c.danger}22` : c.surfaceAlt, border: `1px solid ${c.border}` }}>
                  <input type="checkbox" checked={!!hiddenCols[col.key]} onChange={() => setHiddenCols((p) => ({ ...p, [col.key]: !p[col.key] }))} style={{ width: 14, height: 14 }} />
                  {col.label}
                </label>
              ))}
            </div>
          </div>
          <div style={{ borderTop: `1px solid ${c.border}`, paddingTop: 12 }}>
            <Btn variant="danger" onClick={() => { if (confirm("Reset all project data?")) { setItems([]); setTeam([]); setSeq(1); setCollapsed({}); } }}>Reset Project</Btn>
          </div>
        </div>
      </Modal>

      {/* ════ IMPORT MODAL ══════════════════════════════════════════════ */}
      <Modal open={showImport} onClose={() => setShowImport(false)} title="Import Spreadsheet" width={620}>
        <div style={{ padding: 8 }}>
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>📄</div>
            <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleFileImport} style={{ display: "none" }} />
            <Btn variant="primary" onClick={() => fileRef.current?.click()}><Icon name="upload" size={14} /> Choose CSV File</Btn>
          </div>
          <div style={{ background: c.surfaceAlt, borderRadius: 8, padding: 14, marginBottom: 12, border: `1px solid ${c.border}` }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>Required CSV Headers</div>
            <div style={{ fontSize: 12, color: c.textMuted, lineHeight: 1.7 }}>
              Your CSV file must include a header row. Supported columns (all optional except Name):
            </div>
            <div style={{ fontSize: 11, color: c.textMuted, marginTop: 6, fontFamily: "'Space Mono', monospace", background: c.bg, padding: 10, borderRadius: 6, lineHeight: 1.8, overflowX: "auto" }}>
              Name, Level, Status, Priority, Start Date, End Date, Due Date,<br/>
              % Complete, Est Hours, Actual Hours, Budget/Cost,<br/>
              Responsible Role, Category, Tags, Dependencies, Description
            </div>
          </div>
          <div style={{ background: c.surfaceAlt, borderRadius: 8, padding: 14, marginBottom: 12, border: `1px solid ${c.border}` }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>Field Notes</div>
            <div style={{ fontSize: 12, color: c.textMuted, lineHeight: 1.7 }}>
              <strong>Level</strong> — L1 through L5 (defaults to L4 if missing)<br/>
              <strong>Status</strong> — must match your configured statuses (defaults to "Not Started")<br/>
              <strong>Priority</strong> — Low, Medium, High, or Critical (defaults to "Medium")<br/>
              <strong>Dates</strong> — use YYYY-MM-DD format (e.g., 2026-04-15)<br/>
              <strong>Hours / Cost</strong> — numeric values
            </div>
          </div>
          <div style={{ background: c.surfaceAlt, borderRadius: 8, padding: 14, border: `1px solid ${c.border}` }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>Sample CSV</div>
            <div style={{ fontSize: 11, fontFamily: "'Space Mono', monospace", color: c.textMuted, background: c.bg, padding: 10, borderRadius: 6, overflowX: "auto", lineHeight: 1.7 }}>
              Name,Level,Status,Priority,Start Date,Due Date,Est Hours<br/>
              "Design Phase",L1,Not Started,High,2026-04-01,2026-05-01,40<br/>
              "Wireframes",L2,In Progress,Medium,2026-04-01,2026-04-15,20<br/>
              "Homepage mockup",L4,Not Started,Medium,2026-04-05,2026-04-10,8
            </div>
          </div>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ProjectManager));
</script>
</body>
</html>
